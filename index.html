<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despedida Solteiro do Daniel da Flora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4ece1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .etapa-hidden { display: none; }
        .transition-all { transition: all 0.5s ease; }
        .shadow-xl { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="pb-10 m-0">

    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-3xl font-black mb-2 text-slate-800">HOLA! 🇪🇸</h1>
            <p class="text-gray-500 mb-6 text-sm">Insere o código de acesso para começar o Rally Paper.</p>
            <input type="password" id="invite-code" class="w-full border-2 border-gray-200 p-3 rounded-xl mb-4 text-center focus:border-yellow-500 outline-none" placeholder="Código de Acesso">
            <button onclick="checkInvite()" class="w-full bg-yellow-500 text-white font-bold py-3 rounded-xl hover:bg-yellow-600 transition uppercase tracking-wider">Entrar</button>
        </div>
    </div>

    <div id="game-content" class="max-w-md mx-auto p-4 opacity-0 transition-all etapa-hidden">
        
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border-b-4 border-yellow-500">
            <div>
                <p class="text-xs text-gray-400 uppercase font-bold tracking-widest">Etapa Atual</p>
                <h2 id="display-etapa-nome" class="text-xl font-black text-slate-800">Ponto de Encontro</h2>
            </div>
            <div class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full font-bold text-sm">
                <span id="current-step-num">1</span>/10
            </div>
        </header>

        <div class="relative mb-6 rounded-2xl overflow-hidden shadow-xl bg-white p-2">
            <img id="etapa-img" src="etapa1.JPG" alt="Etapa Atual" class="w-full h-auto rounded-xl border border-gray-100">
        </div>

        <div id="unlock-zone" class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-slate-800">
            <h3 class="font-bold text-slate-700 mb-2">Desbloquear Próxima Paragem</h3>
            <p class="text-sm text-gray-500 mb-4">Insere a senha que encontraste nesta etapa para avançar:</p>
            
            <input type="text" id="stage-pass" class="w-full border-2 border-gray-100 p-3 rounded-xl mb-4 text-center uppercase font-mono tracking-widest focus:border-green-500 outline-none" placeholder="Senha da Etapa">
            
            <button onclick="verifyStagePass()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 transition uppercase tracking-wider">Avançar</button>
        </div>

        <div id="final-screen" class="etapa-hidden text-center py-10 bg-white p-8 rounded-2xl shadow-xl">
            <h2 class="text-6xl mb-6">🏆</h2>
            <h2 class="text-3xl font-black text-slate-800 uppercase italic">¡ENHORABUENA!</h2>
            <p class="text-gray-600 mt-4 text-sm px-4">Completaram o Madrid Survival Tour. <br>Que comece a festa!</p>
            <button onclick="resetGame()" class="mt-10 text-xs text-gray-400 underline">Reiniciar Jogo (Admin)</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DAS ETAPAS E SENHAS
        const etapas = [
            { nome: "Aeroporto / Metro ✈️", senha: "BOCADILHO", img: "etapa1.JPG" },
            { nome: "O Pequeno Almoço 🥐", senha: "VERMUT", img: "etapa2.JPG" },
            { nome: "Mercado San Miguel 🍷", senha: "COPA", img: "etapa3.JPG" },
            { nome: "Caminhada Central 🚶", senha: "MEXICO", img: "etapa4.JPG" },
            { nome: "Almoço Mexicano 🌮", senha: "HOTEL", img: "etapa5.JPG" },
            { nome: "Check-in Hotel 🏨", senha: "SURPRESA", img: "etapa6.JPG" },
            { nome: "Museu (ou não) 🖼️", senha: "TAPAS", img: "etapa7.JPG" },
            { nome: "Jantar de Tapas 🥘", senha: "SURPRESA", img: "etapa8.JPG" },
            { nome: "A Caminho... 🤫", senha: "DISCO", img: "etapa9.JPG" },
            { nome: "A Noite 🕺", senha: "FIM", img: "etapa10.JPG" }
        ];

        let currentStep = 0;

        // 1. Verificar o Código de Convite Inicial
        function checkInvite() {
            const input = document.getElementById('invite-code').value.toUpperCase();
            // Podes mudar este código se quiseres
            if(input === "MADRID") { 
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('game-content').classList.remove('etapa-hidden');
                setTimeout(() => document.getElementById('game-content').style.opacity = '1', 50);
                loadProgress();
            } else {
                alert("Código de acesso incorreto!");
            }
        }

        // 2. Verificar a Senha da Etapa
        function verifyStagePass() {
            const input = document.getElementById('stage-pass').value.toUpperCase().trim();
            const senhaCorreta = etapas[currentStep].senha;

            if(input === senhaCorreta) {
                if(currentStep < etapas.length - 1) {
                    currentStep++;
                    updateUI();
                    saveProgress();
                } else {
                    showFinal();
                }
            } else {
                alert("Senha da etapa incorreta! Tenta novamente.");
            }
        }

        // 3. Atualizar a Interface (Imagem e Textos)
        function updateUI() {
            const etapa = etapas[currentStep];
            document.getElementById('display-etapa-nome').innerText = etapa.nome;
            document.getElementById('current-step-num').innerText = currentStep + 1;
            document.getElementById('etapa-img').src = etapa.img;
            document.getElementById('stage-pass').value = ""; // Limpa o campo de texto
            window.scrollTo(0, 0); // Faz scroll para o topo ao mudar de etapa
        }

        // 4. Mostrar o Ecrã Final
        function showFinal() {
            document.getElementById('unlock-zone').classList.add('etapa-hidden');
            document.getElementById('etapa-img').parentElement.classList.add('etapa-hidden');
            document.getElementById('final-screen').classList.remove('etapa-hidden');
        }

        // GESTÃO DE PROGRESSO (LocalStorage)
        function saveProgress() {
            localStorage.setItem('madrid_tour_progress', currentStep);
        }

        function loadProgress() {
            const savedStep = localStorage.getItem('madrid_tour_progress');
            if(savedStep) {
                currentStep = parseInt(savedStep);
                updateUI();
            }
        }

        function resetGame() {
            localStorage.removeItem('madrid_tour_progress');
            location.reload();
        }

        // Permite pressionar "Enter" no login e nas senhas
        document.getElementById('invite-code').addEventListener('keypress', e => e.key === 'Enter' && checkInvite());
        document.getElementById('stage-pass').addEventListener('keypress', e => e.key === 'Enter' && verifyStagePass());
    </script>
</body>
</html>
