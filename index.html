<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despedida de Solteiro do Daniel da Flora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4ece1; font-family: sans-serif; }
        .etapa-hidden { display: none; }
        .checkbox-custom { width: 24px; height: 24px; cursor: pointer; accent-color: #eab308; }
    </style>
</head>
<body class="pb-10">

    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-3xl font-black mb-2">HOLA! 🇪🇸</h1>
            <input type="password" id="invite-code" class="w-full border-2 border-gray-200 p-3 rounded-xl mb-4 text-center outline-none" placeholder="Código de Acesso">
            <button onclick="checkInvite()" class="w-full bg-yellow-500 text-white font-bold py-3 rounded-xl uppercase">Entrar</button>
        </div>
    </div>

    <div id="game-content" class="max-w-md mx-auto p-4 opacity-0 transition-all etapa-hidden">
        
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border-b-4 border-yellow-500">
            <div>
                <p class="text-xs text-gray-400 uppercase font-bold">Etapa</p>
                <h2 id="display-etapa-nome" class="text-lg font-black text-slate-800">---</h2>
            </div>
            <div class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full font-bold text-sm">
                <span id="current-step-num">1</span>/10
            </div>
        </header>

        <div class="mb-6 rounded-2xl overflow-hidden shadow-xl bg-white p-2">
            <img id="etapa-img" src="etapa1.JPG" class="w-full h-auto rounded-xl">
        </div>

        <div id="tasks-container" class="bg-white p-6 rounded-2xl shadow-md mb-6 border-l-4 border-yellow-500">
            <h3 class="font-bold text-slate-700 mb-4 uppercase text-sm tracking-widest">Tarefas Obrigatórias:</h3>
            <div id="tasks-list" class="space-y-4"></div>
        </div>

        <div id="unlock-zone" class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-slate-800 opacity-50 pointer-events-none transition-opacity">
            <h3 class="font-bold text-slate-700 mb-2">Próxima Paragem</h3>
            <p class="text-xs text-gray-500 mb-4">Conclui as tarefas acima para inserir a senha:</p>
            <input type="text" id="stage-pass" class="w-full border-2 border-gray-100 p-3 rounded-xl mb-4 text-center uppercase font-mono outline-none" placeholder="Senha">
            <button onclick="verifyStagePass()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl uppercase">Avançar</button>
        </div>

        <div id="final-screen" class="etapa-hidden text-center py-10 bg-white p-8 rounded-2xl shadow-xl">
            <h2 class="text-6xl mb-4">🏆</h2>
            <h2 class="text-2xl font-black italic">¡FIM DA AVENTURA!</h2>
            <button onclick="resetGame()" class="mt-8 text-xs text-gray-400 underline uppercase">Reiniciar</button>
        </div>
    </div>

    <script>
        const etapas = [
            { nome: "Aeroporto / Metro", senha: "BOCADILHO", img: "etapa1.JPG", tarefas: ["Comprar bilhete", "Apanhar metro certo"] },
            { nome: "O Pequeno Almoço", senha: "VERMUT", img: "etapa2.JPG", tarefas: ["Pedir em Espanhol", "Provar o Bocadillo", "Tirar foto do grupo"] },
            { nome: "Mercado San Miguel", senha: "COPA", img: "etapa3.JPG", tarefas: ["Encontrar banca do Vermut", "Brinde coletivo", "Publicar foto de vermut"] },
            { nome: "Caminhada Central", senha: "MEXICO", img: "etapa4.JPG", tarefas: ["Selfie com estátua", "Pedir uma rodada pelo caminho"] },
            { nome: "Almoço Mexicano", senha: "HOTEL", img: "etapa5.JPG", tarefas: ["Beber uma Margarita", "Beber uma cerveja mexicana", "Publicar foto de almoço"] },
            { nome: "Check-in Hotel", senha: "SURPRESA", img: "etapa6.JPG", tarefas: ["Deixar malas", "Banho rápido"] },
            { nome: "Museu (ou não)", senha: "TAPAS", img: "etapa7.JPG", tarefas: ["Chegar ao local"] },
            { nome: "Jantar de Tapas", senha: "SURPRESA", img: "etapa8.JPG", tarefas: ["Publicar foto", "Pedir Patcharan"] },
            { nome: "A Caminho...", senha: "DISCO", img: "etapa9.JPG", tarefas: ["Feito"] },
            { nome: "A Noite", senha: "FIM", img: "etapa10.JPG", tarefas: ["Entrar na Disco", "Dançar com coluna"] }
        ];

        let currentStep = 0;

        function checkInvite() {
            const val = document.getElementById('invite-code').value.trim().toUpperCase();
            if(val === "MADRID") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('game-content').classList.remove('etapa-hidden');
                document.getElementById('game-content').style.opacity = '1';
                loadProgress();
            } else { alert("Código errado!"); }
        }

        function updateUI() {
            const etapa = etapas[currentStep];
            document.getElementById('display-etapa-nome').innerText = etapa.nome;
            document.getElementById('current-step-num').innerText = currentStep + 1;
            document.getElementById('etapa-img').src = etapa.img;
            document.getElementById('stage-pass').value = "";
            
            const list = document.getElementById('tasks-list');
            list.innerHTML = "";
            etapa.tarefas.forEach((tarefa) => {
                list.innerHTML += `
                    <label class="flex items-center space-x-3 p-2 border-b border-gray-50">
                        <input type="checkbox" class="checkbox-custom task-item" onchange="checkTasks()">
                        <span class="text-gray-700 text-sm">${tarefa}</span>
                    </label>
                `;
            });
            checkTasks();
            window.scrollTo(0, 0);
        }

        function checkTasks() {
            const items = document.querySelectorAll('.task-item');
            const allChecked = items.length > 0 && Array.from(items).every(cb => cb.checked);
            const zone = document.getElementById('unlock-zone');
            if(allChecked) {
                zone.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                zone.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function verifyStagePass() {
            const pass = document.getElementById('stage-pass').value.toUpperCase().trim();
            if(pass === etapas[currentStep].senha) {
                if(currentStep < etapas.length - 1) {
                    currentStep++;
                    updateUI();
                    saveProgress();
                } else { showFinal(); }
            } else { alert("Senha incorreta!"); }
        }

        function showFinal() {
            document.getElementById('tasks-container').classList.add('etapa-hidden');
            document.getElementById('unlock-zone').classList.add('etapa-hidden');
            document.getElementById('etapa-img').parentElement.classList.add('etapa-hidden');
            document.getElementById('final-screen').classList.remove('etapa-hidden');
        }

        function saveProgress() { localStorage.setItem('madrid_tour_progress', currentStep); }
        function loadProgress() {
            const saved = localStorage.getItem('madrid_tour_progress');
            if(saved) currentStep = parseInt(saved);
            updateUI();
        }
        function resetGame() { localStorage.removeItem('madrid_tour_progress'); location.reload(); }
    </script>
</body>
</html>
